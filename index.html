<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <!-- Key: www.google.com -->

    <title>Laptop Store</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Laptop Store</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Laptops</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="products">

        <div class="card">
            <img src="assets/product1.jpg" alt="HP Pavilion 15">
            <h3>HP Pavilion 15</h3>
            <p>₹62,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product2.jpg" alt="Dell Inspiron 15">
            <h3>Dell Inspiron 15</h3>
            <p>₹58,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product3.jpg" alt="Lenovo IdeaPad Slim 5">
            <h3>Lenovo IdeaPad Slim 5</h3>
            <p>₹64,990</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product4.jpg" alt="ASUS VivoBook 16">
            <h3>ASUS VivoBook 16</h3>
            <p>₹59,990</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product5.jpg" alt="Acer Aspire 7">
            <h3>Acer Aspire 7</h3>
            <p>₹54,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product6.jpg" alt="MacBook Air M4">
            <h3>MacBook Air M4</h3>
            <p>₹1,09,900</p>
            <button>Buy Now</button>
        </div>

    </section>

    <footer>
        <p>© 2026 Laptop Store. All Rights Reserved.</p>
    </footer>

</body>
</html>
